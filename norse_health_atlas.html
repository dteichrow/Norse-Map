<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel&family=EB+Garamond&display=swap">
    <style>
        body {
            font-family: 'Cinzel', serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        :root {
            --background-color: #f0f0f0;
            --text-color: #333;
        }
        .dark-mode {
            --background-color: #333;
            --text-color: #f0f0f0;
        }
        .map-container {
            height: 600px;
        }
        /* Additional CSS styles for layout and functionality */
    </style>
    <title>Norse World Health Atlas</title>
</head>
<body>
    <div id="map" class="map-container"></div>
    <div id="side-panel">
        <h2>Viking Age Health Sites</h2>
        <div id="site-details"></div>
    </div>
    <button id="theme-toggle">Toggle Dark/Light Mode</button>
    <script>
        const healthSites = [
            'Ribe', 'Birka', 'Varnhem', 'Hedeby', 'Kaupang', 'Kopparsvik', 'Trondheim',
            'Hrísbrú', 'Western Settlement', 'Eastern Settlement', 'Faroe Islands',
            'L\'Anse aux Meadows', 'Dublin', 'York', 'Orkney Islands', 'Oxford',
            'Rouen', 'Staraya Ladoga', 'Novgorod', 'Kyiv', 'Constantinople',
            'A Coruña', 'Lisbon', 'Seville', 'Strait of Gibraltar'
        ];
        const map = L.map('map').setView([60, 10], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 18}).addTo(map);
        // Add markers and other functionalities here
        document.getElementById('theme-toggle').addEventListener('click', function() {
            document.body.classList.toggle('dark-mode');
        });
        // Additional JavaScript functionalities for interactivity
    </script>
</body>
</html>
