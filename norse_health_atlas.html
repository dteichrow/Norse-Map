<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norse World Health Atlas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Cinzel|EB+Garamond">
    <style>
        body { font-family: 'EB Garamond', serif; }
        .dark-theme { background-color: #121212; color: #ffffff; }
        .light-theme { background-color: #ffffff; color: #000000; }
        /* additional styles for sidebar, filters, etc. */
    </style>
</head>
<body>
    <header>
        <h1>Norse World Health Atlas</h1>
        <button id="theme-toggle">Toggle Dark/Light Theme</button>
    </header>
    <aside id="sidebar">
        <h2>Site Details</h2>
        <div id="site-info"></div>
    </aside>
    <main>
        <h2>Viking Age Health Sites</h2>
        <div>
            <label for="region-filter">Choose a region:</label>
            <select id="region-filter">
                <option value="all">All</option>
                <option value="scandinavia">Scandinavia</option>
                <option value="iceland">Iceland</option>
                <option value="greenland">Greenland</option>
                <option value="n-atlantic">N. Atlantic</option>
                <option value="british-isles">British Isles</option>
                <option value="eastern-routes">Eastern Routes</option>
                <option value="normandy">Normandy</option>
                <option value="iberia">Iberia</option>
            </select>
        </div>
        <div id="map"></div>
        <div id="legend">
            <h3>Legend</h3>
            <!-- legend showing regions and evidence density -->
        </div>
        <div id="trade-routes">
            <!-- Visualization of trade routes -->
        </div>
    </main>
    <script>
        // JavaScript for handling theme toggle, filters, collapsible panels, and other interactivity
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            document.body.classList.toggle('light-theme');
        });
        // more interactivity code...
    </script>
</body>
</html>
