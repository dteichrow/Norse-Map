<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norse World Health Atlas</title>
    <style>
        :root {
            --background-color: #fff;
            --text-color: #000;
        }
        [data-theme="dark"] {
            --background-color: #333;
            --text-color: #fff;
        }
        body {
            background-color: var(--background-color);
            color: var(--text-color);
        }
        /* Additional CSS for layout and styling */
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <h1>Norse World Health Atlas</h1>
    <button id="themeToggle">Toggle Theme</button>
    <div id="map" style="height: 600px;"></div>
    <div id="sidePanel">
        <h2>Site Information</h2>
        <div id="siteDetails">No site selected.</div>
        <!-- Collapsible panel for site information -->
    </div>
    <script>
        const map = L.map('map').setView([60.4720, 8.4689], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        const healthSites = [
            { lat: 60.0, lon: 10.0, name: 'Site A', evidence: 'Dense', pathogens: 'None', diet: 'Mixed', violence: 'Low' },
            { lat: 61.0, lon: 11.0, name: 'Site B', evidence: 'Sparse', pathogens: 'Bacteria', diet: 'Fruits', violence: 'High' },
            // ... Additional sites data here
        ];

        healthSites.forEach(site => {
            const marker = L.marker([site.lat, site.lon]).addTo(map);
            marker.bindPopup(`<b>${site.name}</b><br>Evidence: ${site.evidence}<br>Pathogens: ${site.pathogens}<br>Diet: ${site.diet}<br>Violence: ${site.violence}`);
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        });

        // Functionality for interactive filters and trade routes visualization
    </script>
</body>
</html>
